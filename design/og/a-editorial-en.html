<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body{background:var(--ivory);color:var(--green);padding:64px 72px;display:flex;flex-direction:column;justify-content:space-between;}
.eyebrow{font-size:14px;letter-spacing:.32em;color:var(--gold);}
.rule{width:64px;height:2px;background:var(--gold);margin:18px 0 36px;}
h1{font-size:104px;font-weight:700;line-height:.98;letter-spacing:-.025em;}
h1 .accent{color:var(--gold);}
.sub{font-size:24px;color:var(--ink-muted);margin-top:24px;font-weight:500;max-width:780px;}
.foot{display:flex;align-items:center;justify-content:space-between;}
.mark{display:flex;align-items:center;gap:18px;}
.mark img{width:84px;height:84px;}
.mark .name{font-size:24px;font-weight:700;letter-spacing:-.01em;color:var(--green);}
.kw{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;background:var(--gold);color:var(--green);font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;letter-spacing:.05em;}
</style></head>
<body>
<div>
  <div class="eyebrow mono">MINDSYNC · KUWAIT · EST. 2026</div>
  <div class="rule"></div>
  <h1>Your Business,<br><span class="accent">Automated.</span></h1>
  <div class="sub">AI agents for clinics, salons, gyms, garages, restaurants & real-estate.</div>
</div>
<div class="foot">
  <div class="mark"><img src="logo.png" alt=""><span class="name">MindSync</span></div>
  <div class="kw">KW</div>
</div>
</body></html>
