<!doctype html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body{background:var(--ivory);color:var(--green);padding:64px 72px;display:flex;flex-direction:column;justify-content:space-between;font-family:'Noto Kufi Arabic',sans-serif;direction:rtl;}
.eyebrow{font-size:14px;letter-spacing:.32em;color:var(--gold);font-family:'JetBrains Mono',monospace;direction:ltr;text-align:right;}
.rule{width:64px;height:2px;background:var(--gold);margin:18px 0 36px;margin-right:0;margin-left:auto;}
h1{font-size:104px;font-weight:700;line-height:1.1;letter-spacing:-.01em;}
h1 .accent{color:var(--gold);}
.sub{font-size:24px;color:var(--ink-muted);margin-top:24px;font-weight:500;max-width:900px;line-height:1.5;}
.foot{display:flex;align-items:center;justify-content:space-between;}
.mark{display:flex;align-items:center;gap:18px;}
.mark img{width:84px;height:84px;}
.mark .name{font-size:24px;font-weight:700;color:var(--green);font-family:'Noto Kufi Arabic',sans-serif;}
.kw{display:inline-flex;align-items:center;justify-content:center;width:60px;height:60px;border-radius:50%;background:var(--gold);color:var(--green);font-family:'JetBrains Mono',monospace;font-weight:500;font-size:15px;letter-spacing:.05em;direction:ltr;}
</style></head>
<body>
<div>
  <div class="eyebrow">MINDSYNC · KUWAIT · EST. 2026</div>
  <div class="rule"></div>
  <h1>أعمالك،<br><span class="accent">مؤتمتة.</span></h1>
  <div class="sub">وكلاء ذكاء اصطناعي للعيادات، الصالونات، الجيمات، الورش، المطاعم، والعقارات.</div>
</div>
<div class="foot">
  <div class="mark"><img src="logo.png" alt=""><span class="name">مايند سينك</span></div>
  <div class="kw">KW</div>
</div>
</body></html>
