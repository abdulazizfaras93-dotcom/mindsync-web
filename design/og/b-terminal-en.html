<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body{background:linear-gradient(135deg,#0F2E22 0%,#153E2D 55%,#1C5038 100%);color:var(--ivory);padding:64px 72px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;}
body::before{content:"";position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,0.05) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;}
.arcs{position:absolute;top:-200px;right:-200px;width:560px;height:560px;opacity:.2;pointer-events:none;}
.arcs circle{fill:none;stroke:var(--gold);stroke-width:1;}
.eyebrow{font-size:14px;letter-spacing:.32em;color:var(--gold);position:relative;}
.rule{width:64px;height:2px;background:var(--gold);margin:18px 0 36px;}
h1{font-size:108px;font-weight:700;line-height:.98;letter-spacing:-.025em;position:relative;}
h1 .accent{color:var(--gold);}
.sub{font-size:22px;color:rgba(251,250,245,0.65);margin-top:28px;font-weight:500;max-width:780px;position:relative;}
.foot{display:flex;align-items:center;justify-content:space-between;position:relative;}
.mark{display:flex;align-items:center;gap:18px;background:var(--ivory);padding:10px 22px 10px 14px;border-radius:14px;}
.mark img{width:60px;height:60px;}
.mark .name{font-size:22px;font-weight:700;color:var(--green);letter-spacing:-.01em;}
.url{font-family:'JetBrains Mono',monospace;color:var(--gold);font-size:18px;letter-spacing:.05em;}
</style></head>
<body>
<svg class="arcs" viewBox="0 0 560 560"><circle cx="560" cy="0" r="280"/><circle cx="560" cy="0" r="200"/><circle cx="560" cy="0" r="120"/></svg>
<div>
  <div class="eyebrow mono">07 DAY DELIVERY · 6 INDUSTRY BUNDLES</div>
  <div class="rule"></div>
  <h1>Your Business,<br><span class="accent">Automated.</span></h1>
  <div class="sub">Built, deployed, and maintained — in 7 business days. Made in Kuwait.</div>
</div>
<div class="foot">
  <div class="mark"><img src="logo.png" alt=""><span class="name">MindSync</span></div>
  <div class="url">mindsynckw.com</div>
</div>
</body></html>
