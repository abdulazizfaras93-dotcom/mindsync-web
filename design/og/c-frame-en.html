<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_shared.css">
<style>
body{background:var(--ivory);color:var(--green);padding:40px;}
.frame{width:100%;height:100%;border:2px solid var(--gold);padding:48px 56px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;}
.logo-wrap img{width:200px;height:200px;display:block;}
.tagline{margin-top:8px;}
.eyebrow{font-size:13px;letter-spacing:.32em;color:var(--gold);margin-bottom:18px;}
h1{font-size:88px;font-weight:700;line-height:1;letter-spacing:-.02em;}
h1 .accent{color:var(--gold);}
.sub{font-size:20px;color:var(--ink-muted);margin-top:20px;font-weight:500;}
.foot{display:flex;align-items:center;justify-content:space-between;width:100%;font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:.06em;color:var(--green);text-transform:uppercase;}
.kw{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:50%;background:var(--gold);color:var(--green);font-weight:500;font-size:13px;}
</style></head>
<body>
<div class="frame">
  <div class="logo-wrap"><img src="logo.png" alt="MindSync"></div>
  <div class="tagline">
    <div class="eyebrow mono">MINDSYNC · KUWAIT</div>
    <h1>Your Business,<br><span class="accent">Automated.</span></h1>
    <div class="sub">AI automation agency for Kuwaiti SMBs.</div>
  </div>
  <div class="foot"><span>mindsynckw.com</span><span class="kw">KW</span></div>
</div>
</body></html>
