<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MindSync × Lemon Tree — Live demo</title>
<style>
 :root{--g9:#0F2E22;--g8:#153E2D;--g7:#1C5038;--g1:#E8F2EC;--gold:#BF8D38;--gold0:#FBF4E6;--goldl:#EBD9AE;
  --iv:#FBFAF5;--ink:#0E1512;--ink6:#4A5550;--ink4:#9EB5A5;--ln:#DCEAE1;
  --wa:#0B5C4F;--wabg:#ECE4DC;--waout:#DCF8C6;--sans:'Space Grotesk',-apple-system,Segoe UI,sans-serif;
  --ar:'Noto Kufi Arabic','Segoe UI',sans-serif;--mono:'JetBrains Mono',monospace;}
 *{box-sizing:border-box;margin:0;padding:0}
 body{background:#2d3330;font-family:var(--sans);color:var(--ink);padding:22px 14px;min-height:100vh}
 .wrap{max-width:860px;margin:0 auto}
 .top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
 .ttl{display:flex;align-items:center;gap:12px}
 .ttl img{height:42px}
 .ttl h1{font-size:17px;color:#fff;font-weight:700}.ttl p{font-size:11.5px;color:#b9c9c0}
 .ctrl{display:flex;gap:8px;align-items:center}
 .lang{display:flex;border:1px solid rgba(255,255,255,.3);border-radius:8px;overflow:hidden}
 .lang button{font-family:var(--mono);font-size:11px;border:none;background:rgba(255,255,255,.1);color:#fff;padding:6px 12px;cursor:pointer}
 .lang button.on{background:#fff;color:var(--g8)}
 .replay{font-family:var(--sans);font-size:12px;border:1px solid var(--gold);background:var(--gold);color:#fff;padding:7px 16px;border-radius:8px;cursor:pointer;font-weight:500}
 .stage{display:grid;grid-template-columns:300px 1fr;gap:22px;align-items:start}
 @media(max-width:720px){.stage{grid-template-columns:1fr;justify-items:center}}
 /* phone */
 .phone{width:300px;height:600px;background:#000;border-radius:34px;padding:10px;box-shadow:0 16px 50px rgba(0,0,0,.5);flex-shrink:0}
 .screen{width:100%;height:100%;border-radius:26px;overflow:hidden;display:flex;flex-direction:column;background:var(--wabg)}
 .wahead{background:var(--wa);color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px}
 .wahead .av{width:36px;height:36px;border-radius:50%;flex-shrink:0;object-fit:cover}
 .wahead .nm{font-size:14px;font-weight:600;line-height:1.1}
 .wahead .st{font-size:10.5px;color:#bfe6dd}
 .chat{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:7px;background-image:linear-gradient(rgba(236,228,220,.6),rgba(236,228,220,.6))}
 .msg{max-width:80%;padding:7px 10px;border-radius:9px;font-size:12.5px;line-height:1.45;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.08);word-wrap:break-word;animation:pop .2s ease}
 @keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
 .in{background:#fff;align-self:flex-start;border-top-left-radius:2px}
 .out{background:var(--waout);align-self:flex-end;border-top-right-radius:2px}
 .rtl .in{align-self:flex-end;border-top-left-radius:9px;border-top-right-radius:2px}
 .rtl .out{align-self:flex-start;border-top-right-radius:9px;border-top-left-radius:2px}
 .tick{font-size:9px;color:#9bbf8f;margin-inline-start:4px}
 .typing{align-self:flex-start;background:#fff;padding:9px 12px;border-radius:9px;display:flex;gap:3px}
 .rtl .typing{align-self:flex-end}
 .typing i{width:6px;height:6px;border-radius:50%;background:#aab;animation:bl 1s infinite}
 .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
 @keyframes bl{0%,60%,100%{opacity:.3}30%{opacity:1}}
 /* side panel */
 .side{align-self:stretch;padding-top:4px}
 .cap{background:var(--iv);border:1px solid var(--ln);border-left:3px solid var(--gold);border-radius:0 12px 12px 0;padding:16px 18px;min-height:96px;transition:.25s}
 .rtl .cap{border-left:none;border-right:3px solid var(--gold);border-radius:12px 0 0 12px}
 .cap .step{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold)}
 .cap .tx{font-size:15px;color:var(--g8);font-weight:500;margin-top:8px;line-height:1.5}
 .dash{margin-top:16px;background:var(--g8);border-radius:14px;padding:16px 18px;color:#fff;opacity:.25;transition:.4s;transform:translateY(6px)}
 .dash.live{opacity:1;transform:none}
 .dash .dh{font-size:11px;color:#9fc3b0;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:12px}
 .drow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
 .pill{background:rgba(255,255,255,.1);border:1px solid rgba(191,141,56,.5);border-radius:8px;padding:7px 11px;font-size:11.5px;display:flex;align-items:center;gap:6px}
 .pill b{color:var(--gold)}
 .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
 .kpi{background:rgba(255,255,255,.07);border-radius:9px;padding:9px;text-align:center}
 .kpi .v{font-size:18px;font-weight:700}.kpi .l{font-size:9px;color:#bcd;margin-top:2px;line-height:1.2}
 .done{margin-top:12px;font-size:12px;color:var(--gold);font-weight:500;opacity:0;transition:.4s}
 .done.live{opacity:1}
 .foot{margin-top:18px;text-align:center;font-family:var(--mono);font-size:10px;color:#9aa7a1}
 .rtl .side,.rtl .cap,.rtl .dash{font-family:var(--ar)}
</style></head><body>
