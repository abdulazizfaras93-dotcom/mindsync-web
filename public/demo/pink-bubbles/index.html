<style>
  :root{
    --pink:#E8569A; --pink-deep:#C13584; --pink-soft:#FFF0F6; --pink-tint:#FCE3EF;
    --ms-green:#153E2D; --ms-gold:#BF8D38; --ink:#1A1014; --muted:#8A6B78;
    --wa-bg:#F4E8EF; --in:#FFFFFF; --out:#F7C9DF;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Noto Kufi Arabic','Space Grotesk',sans-serif;
    background:radial-gradient(circle at 50% 0%, #2a1620, #140a10 70%);
    display:flex;align-items:center;justify-content:center;
    min-height:100dvh;padding:18px;color:var(--ink);
  }
  body[dir="ltr"]{font-family:'Space Grotesk','Noto Kufi Arabic',sans-serif}
  .stage{width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .toggle{display:flex;gap:6px;background:rgba(255,255,255,.08);padding:5px;border-radius:999px}
  .toggle button{
    border:0;background:transparent;color:#fff;opacity:.55;font:inherit;font-size:13px;
    padding:6px 16px;border-radius:999px;cursor:pointer;transition:.2s
  }
  .toggle button.on{background:var(--pink);opacity:1;font-weight:700}
  .phone{
    width:100%;background:#000;border-radius:42px;padding:10px;
    box-shadow:0 30px 80px rgba(232,86,154,.25), 0 0 0 2px rgba(255,255,255,.06);
  }
  .screen{background:var(--wa-bg);border-radius:33px;overflow:hidden;height:680px;display:flex;flex-direction:column;position:relative}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:24px;background:#000;border-radius:0 0 16px 16px;z-index:6}
  .wa-head{
    background:linear-gradient(135deg,var(--pink),var(--pink-deep));
    color:#fff;display:flex;align-items:center;gap:10px;padding:30px 14px 12px;z-index:5
  }
  .wa-head .logo{
    width:44px;height:44px;border-radius:50%;background:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0;overflow:hidden
  }
  .wa-head .logo img{width:100%;height:100%;object-fit:cover}
  .wa-head .who{flex:1;min-width:0}
  .wa-head .who b{font-size:15px;display:block;font-weight:700}
  .wa-head .who span{font-size:11.5px;opacity:.9}
  .wa-head .dots{font-size:18px;opacity:.85}
  .chat{flex:1;overflow-y:auto;padding:14px 12px 26px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
  .chat::-webkit-scrollbar{display:none}
  .row{display:flex;animation:pop .28s ease both}
  .row.me{justify-content:flex-start}
  .row.them{justify-content:flex-end}
  body[dir="ltr"] .row.me{justify-content:flex-end}
  body[dir="ltr"] .row.them{justify-content:flex-start}
  .bub{max-width:80%;padding:9px 12px;border-radius:16px;font-size:13.5px;line-height:1.5;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.06)}
  .me .bub{background:var(--out);border-top-right-radius:5px}
  .them .bub{background:var(--in);border-top-left-radius:5px}
  body[dir="ltr"] .me .bub{border-top-right-radius:16px;border-top-left-radius:5px}
  body[dir="ltr"] .them .bub{border-top-left-radius:16px;border-top-right-radius:5px}
  .bub .t{font-size:9.5px;color:var(--muted);margin-top:3px;text-align:end}
  .me .bub .tick{color:#2196c4}
  .card{background:#fff;border-radius:14px;padding:12px;max-width:84%;box-shadow:0 3px 14px rgba(193,53,132,.15);border:1px solid var(--pink-tint)}
  .card h4{color:var(--pink-deep);font-size:13px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .card .line{display:flex;justify-content:space-between;font-size:12.5px;padding:5px 0;border-bottom:1px dashed var(--pink-tint)}
  .card .line:last-child{border:0;font-weight:700}
  .card .line b{color:var(--pink-deep)}
  .knet{background:linear-gradient(135deg,#0a3d62,#1e5f8c);color:#fff;border-radius:12px;padding:11px 13px;max-width:80%;font-size:12.5px}
  .knet .pay{display:flex;align-items:center;justify-content:space-between;margin-top:7px;background:rgba(255,255,255,.15);border-radius:8px;padding:7px 10px;font-weight:700}
  .knet .pay span{background:#fff;color:#0a3d62;font-size:10px;padding:3px 9px;border-radius:6px}
  .typing{display:flex;gap:3px;padding:11px 14px;background:var(--in);border-radius:16px;border-top-left-radius:5px}
  body[dir="ltr"] .typing{border-top-left-radius:16px}
  .typing i{width:7px;height:7px;background:#c9b3bd;border-radius:50%;animation:blink 1.2s infinite}
  .typing i:nth-child(2){animation-delay:.2s}.typing i:nth-child(3){animation-delay:.4s}
  .over{position:absolute;inset:0;background:linear-gradient(180deg,rgba(20,10,16,.5),rgba(193,53,132,.94));backdrop-filter:blur(3px);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:26px;color:#fff;opacity:0;pointer-events:none;transition:.5s;z-index:7}
  .over.show{opacity:1;pointer-events:auto}
  .over .big{font-size:46px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
  .over .cap{font-size:13.5px;opacity:.95;margin:10px 0 22px;max-width:280px;line-height:1.6}
  .over .cta{font-size:16px;font-weight:700;margin-bottom:7px}
  .over .sub{font-size:12px;opacity:.85;margin-bottom:20px}
  .over .replay{background:#fff;color:var(--pink-deep);border:0;font:inherit;font-weight:700;padding:11px 24px;border-radius:999px;cursor:pointer;font-size:13px}
  .badge{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.16);padding:7px 14px;border-radius:999px;margin-top:18px;font-size:11px}

function showTyping(){
  const r=document.createElement('div'); r.className="row me"; r.id="typing";
  r.innerHTML='<div class="typing"><i></i><i></i><i></i></div>'; chat.appendChild(r); chat.scrollTop=chat.scrollHeight;
}
function killTyping(){ const t=document.getElementById('typing'); if(t) t.remove(); }

function run(){
  clearAll();
  const S=SCRIPTS[lang];
  document.getElementById('hName').textContent=S.name;
  document.getElementById('hStat').textContent=S.online;
  let acc=0;
  S.seq.forEach(step=>{
    acc+=step.d;
    timers.push(setTimeout(()=>{
      if(step.who==="type"){ showTyping(); return; }
      killTyping();
      if(step.who==="them"){ addRow("them",`<div class="bub">${step.t}<div class="t">${tStamp()}</div></div>`); }
      else if(step.who==="me"){ addRow("me",`<div class="bub">${step.t}<div class="t">${tStamp()} <span class="tick">✓✓</span></div></div>`); }
      else if(step.who==="card"){
        const rows=step.lines.map(([a,b])=>`<div class="line"><span>${a}</span><b>${b}</b></div>`).join("");
        addRow("me",`<div class="card"><h4>💅 ${step.title}</h4>${rows}</div>`);
      }
      else if(step.who==="knet"){
        addRow("me",`<div class="knet">🔒 KNET<div class="pay"><span>${step.lbl}</span>${step.amt}</div></div>`);
      }
    },acc));
  });
  acc+=2200;
  timers.push(setTimeout(()=>{
    document.getElementById('ovBig').textContent=S.big;
    document.getElementById('ovCap').textContent=S.cap;
    document.getElementById('ovCta').textContent=S.cta;
    document.getElementById('ovSub').textContent=S.sub;
    document.getElementById('ovBtn').textContent=S.btn;
    document.getElementById('ovBadge').textContent=S.badge;
    over.classList.add('show');
  },acc));
}

run();
</script>
</body>
</html>
