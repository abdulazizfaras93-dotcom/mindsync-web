<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><title>Netlify form detection</title></head>
<body>
  <!-- Static form so Netlify registers the schema at build time. The real form is the React page at /onboarding. -->
  <form name="onboarding" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="onboarding" />
    <input name="bot-field" />
    <input type="text" name="businessName" />
    <input type="text" name="ownerName" />
    <input type="tel" name="phone" />
    <input type="email" name="email" />
    <input type="text" name="city" />
    <input type="text" name="businessType" />
    <textarea name="offering"></textarea>
    <textarea name="mainItems"></textarea>
    <input type="text" name="workingHours" />
    <input type="text" name="daysOff" />
    <input type="tel" name="whatsappNumber" />
    <input type="text" name="instagram" />
    <input type="text" name="website" />
    <input type="text" name="currentChannels" />
    <input type="text" name="agentName" />
    <input type="text" name="tone" />
    <input type="text" name="languages" />
    <textarea name="faqs"></textarea>
    <input type="text" name="tier" />
    <textarea name="integrations"></textarea>
    <textarea name="notes"></textarea>
    <input type="text" name="lang" />
  </form>
</body>
</html>
